allowed_tools:
  - "read_file"
  - "list_files"
  - "visit_url"
  - "http_post"

denied_file_patterns:
  - ".env"
  - "*.env"
  - "**/.env"
  - "*.pem"
  - "id_rsa"
  - "**/.ssh/*"

denied_domains:
  - "attacker.example.com"
  - "exfil.test"

denied_secret_patterns:
  - "API_KEY="
  - "DB_PASSWORD="
  - "SECRET_KEY="
  - "sk-"

require_human_approval:
  - "secret_like_file_read"
  - "private_key_file_read"
  - "external_post_with_secret_like_content"
