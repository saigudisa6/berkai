name: RedTeamCI Agent Security
run-name: >-
  RedTeamCI ${{ inputs.scenario || 'default' }} ${{ inputs.mode || 'ci' }}
  ${{ inputs.correlation_id || github.run_number }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      scenario:
        description: Demo scenario to run
        required: true
        default: support-story
        type: choice
        options:
          - support-story
          - legacy-red-to-green
      mode:
        description: Support-story mode
        required: true
        default: red
        type: choice
        options:
          - red
          - green
      correlation_id:
        description: Optional demo correlation id
        required: false
        default: ""

jobs:
  redteamci:
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ENVIRONMENT: github-actions-demo
      SENTRY_RELEASE: ${{ github.sha }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      REDTEAMCI_SCENARIO: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || 'ci' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration dependencies
        run: python -m pip install -e '.[integrations]'

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run RedTeamCI red-to-green flow
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario != 'support-story' }}
        run: |
          python -m redteamci.cli reset
          python -m redteamci.cli run --expect-fail --summary before.json --junit before.junit.xml --sarif before.sarif
          python -c "import json; data=json.load(open('before.json')); assert data['total_attacks']==4 and data['failed']==3 and data['passed']==1; print('Initial run: 3 failed, 1 passed')"
          python -m redteamci.cli fix pi-003 --use-fixture --apply
          python -m redteamci.cli rerun --expect-pass --summary after.json --junit after.junit.xml --sarif after.sarif
          python -c "import json; data=json.load(open('after.json')); attacks={attack['id']: attack for attack in data['attacks']}; regression=attacks['regression-pi-003-hidden-webpage-env-read']; assert data['total_attacks']==5; assert data['generated_regressions_loaded']==1; assert regression['status']=='PASS'; assert regression['assertion_count']==3; assert regression['assertion_failures']==[]; print('Generated regression tests loaded: 1'); print('Generated regression assertion gates: 3 passed'); print('After patch: 5 passed, 0 failed'); print('AGENT CERTIFIED')"
          python -m redteamci.cli report --before before.json --after after.json
          python -m redteamci.cli github-summary --before before.json --after after.json --github-step-summary
          echo "Report and GitHub summary uploaded"

      - name: Generate support-agent attack plan
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario != 'support-story' }}
        run: python -m redteamci.cli plan --config examples/redteamci.support.yml

      - name: Run support-agent generated gate
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario != 'support-story' }}
        continue-on-error: true
        run: |
          rm -rf tmp/support-traces
          python -m redteamci.cli gate \
            --config examples/redteamci.support.yml \
            --attacks attacks/generated_support_attacks.json \
            --traces-root tmp/support-traces \
            --summary tmp/support_before.json \
            --junit tmp/support_before.junit.xml \
            --sarif tmp/support_before.sarif \
            --github-annotations

      - name: Run support-story red check
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            inputs.scenario == 'support-story' &&
            inputs.mode == 'red'
          }}
        run: |
          python -m redteamci.cli story support --step prepare
          python -m redteamci.cli story support --step plan
          python -m redteamci.cli story support --step red --github-annotations --fail-on-security-failure

      - name: Run support-story green proof
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            inputs.scenario == 'support-story' &&
            inputs.mode == 'green'
          }}
        run: |
          python -m redteamci.cli story support --step full
          python -m redteamci.cli story support --step state

      - name: Upload RedTeamCI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              inputs.scenario == 'support-story' &&
              format('redteamci-support-story-{0}', inputs.mode) ||
              'redteamci-security-artifacts'
            }}
          path: |
            .redteamci/
            redteamci_report.md
            redteamci_github_summary.md
            before.json
            after.json
            tmp/support_before.json
            before.junit.xml
            after.junit.xml
            tmp/support_before.junit.xml
            before.sarif
            after.sarif
            tmp/support_before.sarif
            traces/
            tmp/support-traces/
            patches/
            .demo/support-story/
            attacks/generated_support_attacks.json
