name: RedTeamCI Agent Security

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  redteamci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run RedTeamCI red-to-green flow
        run: |
          python -m redteamci.cli reset
          python -m redteamci.cli run --expect-fail --summary before.json --junit before.junit.xml --sarif before.sarif
          python -c "import json; data=json.load(open('before.json')); assert data['total_attacks']==4 and data['failed']==3 and data['passed']==1; print('Initial run: 3 failed, 1 passed')"
          python -m redteamci.cli fix pi-003 --use-fixture --apply
          python -m redteamci.cli rerun --expect-pass --summary after.json --junit after.junit.xml --sarif after.sarif
          python -c "import json; data=json.load(open('after.json')); attacks={attack['id']: attack for attack in data['attacks']}; regression=attacks['regression-pi-003-hidden-webpage-env-read']; assert data['total_attacks']==5; assert data['generated_regressions_loaded']==1; assert regression['status']=='PASS'; assert regression['assertion_count']==3; assert regression['assertion_failures']==[]; print('Generated regression tests loaded: 1'); print('Generated regression assertion gates: 3 passed'); print('After patch: 5 passed, 0 failed'); print('AGENT CERTIFIED')"
          python -m redteamci.cli report --before before.json --after after.json
          python -m redteamci.cli github-summary --before before.json --after after.json --github-step-summary
          echo "Report and GitHub summary uploaded"

      - name: Upload RedTeamCI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redteamci-security-artifacts
          path: |
            redteamci_report.md
            redteamci_github_summary.md
            before.json
            after.json
            before.junit.xml
            after.junit.xml
            before.sarif
            after.sarif
            traces/
            patches/
